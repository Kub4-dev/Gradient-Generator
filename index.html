<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dream Art</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(circle at top left, #1e293b, transparent 40%),
    radial-gradient(circle at bottom right, #312e81, transparent 40%),
    #020617;
  font-family: Arial, sans-serif;
  color: white;
  padding: 40px 0;
}

.panel {
  display: flex;
  gap: 20px;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  padding: 14px;
  border-radius: 22px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(16px);
  margin-bottom: 20px;
}

.colorBox {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

input[type="color"] {
  width: 60px;
  height: 60px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  padding: 0;
  background: transparent;
  box-shadow: 0 10px 25px rgba(0,0,0,0.45);
  transition: 0.2s ease;
}

input[type="color"]::-webkit-color-swatch-wrapper {
  padding: 5px;
}

input[type="color"]::-webkit-color-swatch {
  border: none;
  border-radius: 14px;
}

input[type="color"]:hover {
  transform: translateY(-3px) scale(1.05);
}

.colorBox span {
  font-size: 12px;
  font-family: monospace;
  opacity: 0.8;
}

button {
  border: none;
  padding: 12px 16px;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
  background: linear-gradient(135deg, #38bdf8, #818cf8);
  color: white;
}

canvas {
  width: min(92vw, 1100px);
  border-radius: 22px;
  box-shadow: 0 0 80px rgba(99,102,241,0.35);
}

.cssWrapper {
  position: relative;
  width: min(92vw,1100px);
  margin-top: 15px;
}

textarea {
  width: 100%;
  height: 180px;
  border-radius: 14px;
  padding: 16px;
  padding-right: 110px;
  background: rgba(0,0,0,0.35);
  color: white;
  border: 1px solid rgba(255,255,255,0.1);
  font-family: monospace;
  outline: none;
  resize: none;
}

.copyBtn {
  position: absolute;
  top: 10px;
  right: 10px;
  padding: 8px 12px;
  border-radius: 10px;
  background: rgba(255,255,255,0.14);
  border: 1px solid rgba(255,255,255,0.12);
  cursor: pointer;
  transition: 0.2s;
}

.copyBtn:hover {
  transform: translateY(-2px);
  background: rgba(255,255,255,0.20);
}

.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  padding: 14px 20px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.12);
  color: #7CFFB2;
  font-size: 14px;
  opacity: 0;
  transition: 0.3s ease;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(-5px);
}
</style>
</head>

<body>

<h1>✨ Dream Art </h1>

<div class="panel">

  <div class="colorBox">
    <input type="color" id="c1" value="#00c6ff">
    <span id="h1">#00c6ff</span>
  </div>

  <div class="colorBox">
    <input type="color" id="c2" value="#7c3aed">
    <span id="h2">#7c3aed</span>
  </div>

  <div class="colorBox">
    <input type="color" id="c3" value="#ff4ecd">
    <span id="h3">#ff4ecd</span>
  </div>

  <button onclick="update()">🎨 Generate</button>
  <button onclick="randomize()">✨ Random</button>
  <button onclick="download()">⬇ PNG</button>

</div>

<canvas id="canvas" width="1200" height="700"></canvas>

<div class="cssWrapper">
  <textarea id="css" readonly></textarea>

  <button class="copyBtn" onclick="copyCSS()">
    📋 Copy
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const toast = document.getElementById("toast");

function rand(min,max){ return Math.random()*(max-min)+min; }

function hexToRgb(hex){
  const n = parseInt(hex.slice(1),16);
  return { r:(n>>16)&255, g:(n>>8)&255, b:n&255 };
}

function rgba(hex,a){
  const c = hexToRgb(hex);
  return `rgba(${c.r},${c.g},${c.b},${a})`;
}

/* DRAW */
function draw(colors){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const angle = rand(0,Math.PI*2);

  const g = ctx.createLinearGradient(
    canvas.width/2 + Math.cos(angle)*canvas.width,
    canvas.height/2 + Math.sin(angle)*canvas.width,
    canvas.width/2 - Math.cos(angle)*canvas.width,
    canvas.height/2 - Math.sin(angle)*canvas.width
  );

  g.addColorStop(0, colors[0]);
  g.addColorStop(1, colors[2]);

  ctx.fillStyle = g;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

/* CSS */
function cssGen(colors){
  return `.generated-bg {
  background: linear-gradient(120deg,
    ${colors[0]},
    ${colors[1]},
    ${colors[2]}
  );
}`;
}

/* UI */
function getColors(){
  return [c1.value, c2.value, c3.value];
}

function update(){
  const c = getColors();
  draw(c);
  css.value = cssGen(c);

  h1.textContent = c[0];
  h2.textContent = c[1];
  h3.textContent = c[2];
}

/* RANDOM */
function randomHex(){
  return "#"+Math.floor(Math.random()*16777215).toString(16).padStart(6,"0");
}

function randomize(){
  c1.value = randomHex();
  c2.value = randomHex();
  c3.value = randomHex();
  update();
}

/* COPY FIX (PEŁNY FALLBACK) */
function copyCSS(){
  const text = css.value;

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text)
      .then(() => showToast("CSS został skopiowany — możesz go użyć we własnej stronie"))
      .catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text){
  const textarea = document.getElementById("css");
  textarea.focus();
  textarea.select();

  try {
    document.execCommand("copy");
    showToast("CSS został skopiowany — możesz go użyć we własnej stronie");
  } catch (e) {
    showToast("Nie udało się skopiować 😕");
  }
}

function showToast(msg){
  toast.textContent = msg;
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 2500);
}

/* DOWNLOAD */
function download(){
  const a = document.createElement("a");
  a.download = "gradient-image-generated-by-JK-Gradient-Generator.png";
  a.href = canvas.toDataURL("image/png");
  a.click();
}

/* INIT */
update();
</script>

</body>
</html>
