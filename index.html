<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dream Art Generator</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(circle at top left, #1e293b, transparent 40%),
    radial-gradient(circle at bottom right, #312e81, transparent 40%),
    #020617;
  font-family: Inter, Arial, sans-serif;
  color: white;
  padding: 40px 0;
}

h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

p {
  opacity: 0.7;
  margin-bottom: 20px;
}

/* PANEL */
.panel {
  display: flex;
  gap: 18px;
  align-items: center;
  padding: 16px;
  border-radius: 22px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(16px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  margin-bottom: 20px;
}

/* COLOR BOX */
.colorBox {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.colorBox span {
  font-size: 12px;
  font-family: monospace;
  opacity: 0.8;
}

/* COLOR PICKER */
input[type="color"] {
  width: 75px;
  height: 75px;
  border-radius: 18px;
  border: none;
  cursor: pointer;
  padding: 0;
  overflow: hidden;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  box-shadow: 0 12px 30px rgba(0,0,0,0.4);
}

input[type="color"]:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 18px 40px rgba(0,0,0,0.6);
}

input[type="color"]::-webkit-color-swatch-wrapper {
  padding: 0;
  border-radius: 18px;
}

input[type="color"]::-webkit-color-swatch {
  border: none;
  border-radius: 18px;
}

/* BUTTONS */
button {
  border: none;
  padding: 12px 18px;
  border-radius: 14px;
  font-weight: 700;
  cursor: pointer;
  background: linear-gradient(135deg, #38bdf8, #818cf8);
  color: white;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(56,189,248,0.3);
}

/* CANVAS */
canvas {
  width: min(92vw, 1100px);
  border-radius: 22px;
  box-shadow: 0 0 80px rgba(99,102,241,0.35);
}

/* OUTPUT */
textarea {
  margin-top: 15px;
  width: min(92vw,1100px);
  height: 180px;
  border-radius: 14px;
  padding: 12px;
  background: rgba(0,0,0,0.3);
  color: white;
  border: 1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<h1>✨ Dream Art</h1>
<p>Premium gradient generator + CSS export</p>

<div class="panel">

  <div class="colorBox">
    <input type="color" id="color1" value="#00c6ff">
    <span id="hex1">#00c6ff</span>
  </div>

  <div class="colorBox">
    <input type="color" id="color2" value="#7c3aed">
    <span id="hex2">#7c3aed</span>
  </div>

  <div class="colorBox">
    <input type="color" id="color3" value="#ff4ecd">
    <span id="hex3">#ff4ecd</span>
  </div>

  <button onclick="generateArt()">🎨 Generuj</button>
  <button onclick="randomGradient()">✨ Random</button>
  <button onclick="downloadImage()">⬇ PNG</button>
</div>

<canvas id="canvas" width="1200" height="700"></canvas>

<textarea id="cssOutput"></textarea>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function rand(min,max){ return Math.random()*(max-min)+min; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function hexToRgb(hex){
  const n = parseInt(hex.slice(1),16);
  return { r:(n>>16)&255, g:(n>>8)&255, b:n&255 };
}

function rgba(hex,a){
  const c = hexToRgb(hex);
  return `rgba(${c.r},${c.g},${c.b},${a})`;
}

/* CANVAS ART */
function createArt(colors){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const angle = rand(0,Math.PI*2);

  const g = ctx.createLinearGradient(
    canvas.width/2 + Math.cos(angle)*canvas.width,
    canvas.height/2 + Math.sin(angle)*canvas.height,
    canvas.width/2 - Math.cos(angle)*canvas.width,
    canvas.height/2 - Math.sin(angle)*canvas.height
  );

  g.addColorStop(0, colors[0]);
  g.addColorStop(0.5, colors[1]);
  g.addColorStop(1, colors[2]);

  ctx.fillStyle = g;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.globalCompositeOperation = "screen";

  for(let i=0;i<25;i++){
    const x = rand(0,canvas.width);
    const y = rand(0,canvas.height);
    const r = rand(200,600);

    const rg = ctx.createRadialGradient(x,y,0,x,y,r);
    rg.addColorStop(0, rgba(pick(colors),0.4));
    rg.addColorStop(1,"transparent");

    ctx.fillStyle = rg;
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fill();
  }

  ctx.globalCompositeOperation = "source-over";
  vignette();
}

function vignette(){
  const v = ctx.createRadialGradient(
    canvas.width/2,canvas.height/2,canvas.width*0.2,
    canvas.width/2,canvas.height/2,canvas.width*0.8
  );

  v.addColorStop(0,"transparent");
  v.addColorStop(1,"rgba(0,0,0,0.45)");

  ctx.fillStyle = v;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

/* CSS EXPORT */
function generateCSS(colors){
  const angle = Math.floor(rand(0,360));

  return `
.generated-bg {
  background: linear-gradient(${angle}deg,
    ${colors[0]},
    ${colors[1]},
    ${colors[2]}
  );
}
`;
}

/* UI */
function getColors(){
  return [
    document.getElementById("color1").value,
    document.getElementById("color2").value,
    document.getElementById("color3").value
  ];
}

function generateArt(){
  const colors = getColors();
  createArt(colors);
  document.getElementById("cssOutput").value = generateCSS(colors);
  updateHex();
}

function randomHex(){
  return "#"+Math.floor(Math.random()*16777215).toString(16).padStart(6,"0");
}

function randomGradient(){
  document.getElementById("color1").value = randomHex();
  document.getElementById("color2").value = randomHex();
  document.getElementById("color3").value = randomHex();
  generateArt();
}

function downloadImage(){
  const a = document.createElement("a");
  a.download = "art.png";
  a.href = canvas.toDataURL("image/png");
  a.click();
}

/* HEX LIVE UPDATE */
function updateHex(){
  document.getElementById("hex1").textContent = document.getElementById("color1").value;
  document.getElementById("hex2").textContent = document.getElementById("color2").value;
  document.getElementById("hex3").textContent = document.getElementById("color3").value;
}

document.getElementById("color1").addEventListener("input", updateHex);
document.getElementById("color2").addEventListener("input", updateHex);
document.getElementById("color3").addEventListener("input", updateHex);

generateArt();
</script>

</body>
</html>
