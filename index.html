<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Art Generator</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top left, #1e293b, transparent 40%),
        radial-gradient(circle at bottom right, #312e81, transparent 40%),
        #020617;
      font-family: Inter, Arial, sans-serif;
      color: white;
      overflow-x: hidden;
      padding: 40px 0;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
      letter-spacing: 1px;
      text-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    p {
      opacity: 0.7;
      margin-bottom: 25px;
    }

    .panel {
      display: flex;
      gap: 12px;
      margin-bottom: 25px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(14px);
      padding: 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    button {
      border: none;
      padding: 12px 20px;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.25s;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      color: white;
      font-size: 14px;
    }

    button:hover {
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 8px 20px rgba(56,189,248,0.35);
    }

    canvas {
      width: min(92vw, 1100px);
      height: auto;
      border-radius: 28px;
      background: black;
      box-shadow:
        0 0 80px rgba(99,102,241,0.35),
        0 20px 80px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.08);
    }

    input[type="color"] {
      width: 64px;
      height: 64px;
      border: none;
      border-radius: 18px;
      background: transparent;
      cursor: pointer;
      overflow: hidden;
      padding: 0;
    }

    input[type="color"]::-webkit-color-swatch {
      border: none;
      border-radius: 18px;
    }

    input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }
  </style>
</head>
<body>

  <h1>✨ AI Dream Art</h1>
  <p>Generator gradientowych obrazów AI z własnymi kolorami</p>

  <div class="panel">
    <input type="color" id="color1" value="#00c6ff">
    <input type="color" id="color2" value="#7c3aed">
    <input type="color" id="color3" value="#ff4ecd">

    <button onclick="generateArt()">🎨 Generuj</button>
    <button onclick="randomGradient()">✨ Random Gradient</button>
    
    <button onclick="downloadImage()">⬇ Pobierz</button>
  </div>

  

  <canvas id="canvas" width="1200" height="700"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function hexToRgb(hex) {
      const bigint = parseInt(hex.slice(1), 16);
      return {
        r: (bigint >> 16) & 255,
        g: (bigint >> 8) & 255,
        b: bigint & 255
      };
    }

    function rgba(hex, alpha) {
      const c = hexToRgb(hex);
      return `rgba(${c.r}, ${c.g}, ${c.b}, ${alpha})`;
    }

    function createBeautifulGradient(colors) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const mainAngle = rand(0, Math.PI * 2);

      const mainGradient = ctx.createLinearGradient(
        canvas.width / 2 + Math.cos(mainAngle) * canvas.width,
        canvas.height / 2 + Math.sin(mainAngle) * canvas.height,
        canvas.width / 2 - Math.cos(mainAngle) * canvas.width,
        canvas.height / 2 - Math.sin(mainAngle) * canvas.height
      );

      mainGradient.addColorStop(0, colors[0]);
      mainGradient.addColorStop(rand(0.3, 0.6), colors[1]);
      mainGradient.addColorStop(1, colors[2]);

      ctx.fillStyle = mainGradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.globalCompositeOperation = 'screen';

      for (let i = 0; i < 25; i++) {
        const x = rand(-200, canvas.width + 200);
        const y = rand(-200, canvas.height + 200);
        const radius = rand(250, 700);

        const radial = ctx.createRadialGradient(x, y, 0, x, y, radius);

        radial.addColorStop(0, rgba(pick(colors), rand(0.25, 0.55)));
        radial.addColorStop(0.45, rgba(pick(colors), rand(0.08, 0.18)));
        radial.addColorStop(1, 'transparent');

        ctx.fillStyle = radial;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.globalCompositeOperation = 'overlay';

      for (let i = 0; i < 12; i++) {
        const softGradient = ctx.createLinearGradient(
          rand(0, canvas.width),
          rand(0, canvas.height),
          rand(0, canvas.width),
          rand(0, canvas.height)
        );

        softGradient.addColorStop(0, rgba(pick(colors), 0));
        softGradient.addColorStop(0.5, rgba(pick(colors), rand(0.04, 0.12)));
        softGradient.addColorStop(1, rgba(pick(colors), 0));

        ctx.fillStyle = softGradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      ctx.globalCompositeOperation = 'soft-light';

      for (let i = 0; i < 8; i++) {
        const wave = ctx.createLinearGradient(
          rand(0, canvas.width),
          rand(0, canvas.height),
          rand(0, canvas.width),
          rand(0, canvas.height)
        );

        wave.addColorStop(0, rgba(pick(colors), 0));
        wave.addColorStop(0.5, rgba(pick(colors), 0.18));
        wave.addColorStop(1, rgba(pick(colors), 0));

        ctx.fillStyle = wave;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      ctx.globalCompositeOperation = 'source-over';

      addNoise(3);
      addVignette();
      addLight();
    }

    function addNoise(intensity = 5) {
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;

      for (let i = 0; i < data.length; i += 4) {
        const noise = rand(-intensity, intensity);

        data[i] += noise;
        data[i + 1] += noise;
        data[i + 2] += noise;
      }

      ctx.putImageData(imageData, 0, 0);
    }

    function addVignette() {
      const vignette = ctx.createRadialGradient(
        canvas.width / 2,
        canvas.height / 2,
        canvas.width * 0.2,
        canvas.width / 2,
        canvas.height / 2,
        canvas.width * 0.75
      );

      vignette.addColorStop(0, 'transparent');
      vignette.addColorStop(1, 'rgba(0,0,0,0.28)');

      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function getSelectedColors() {
      return [
        document.getElementById('color1').value,
        document.getElementById('color2').value,
        document.getElementById('color3').value
      ];
    }

    function generateArt() {
      createBeautifulGradient(getSelectedColors());
    }

    function randomGradient() {
      document.getElementById('color1').value = randomHex();
      document.getElementById('color2').value = randomHex();
      document.getElementById('color3').value = randomHex();

      generateArt();
    }

    function randomHex() {
      return '#' + Math.floor(Math.random() * 16777215)
        .toString(16)
        .padStart(6, '0');
    }

    function addLight() {
      const light = ctx.createRadialGradient(
        canvas.width * rand(0.2, 0.8),
        canvas.height * rand(0.2, 0.8),
        0,
        canvas.width / 2,
        canvas.height / 2,
        canvas.width
      );

      light.addColorStop(0, 'rgba(255,255,255,0.12)');
      light.addColorStop(1, 'transparent');

      ctx.fillStyle = light;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    

    function downloadImage() {
      const link = document.createElement('a');
      link.download = 'ai-gradient.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    generateArt();
  </script>
</body>
</html>
